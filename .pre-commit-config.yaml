# ZECT Pre-Commit Hooks
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Backend — Python linting & formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        name: ruff-lint
        args: [check, --fix]
        files: ^backend/
      - id: ruff-format
        name: ruff-format
        files: ^backend/

  # Frontend — Prettier formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: prettier
        files: ^frontend/src/
        types_or: [javascript, jsx, typescript, tsx, css, json]
        additional_dependencies: ['prettier@3.2.5']

  # General — trailing whitespace, end-of-file, YAML check
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        files: ^frontend/
      - id: check-merge-conflict
      - id: detect-private-key
